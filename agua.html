<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaFlow - Mi Hidratación Personal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0a0a0a;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 24px;
        }
        .btn-primary {
            background: #10b981;
            color: #000;
            font-weight: 800;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover {
            background: #34d399;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .progress-circle {
            transition: stroke-dashoffset 0.6s ease-out;
            transform: rotate(-90deg);
            transform-origin: center;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col items-center mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-emerald-500 italic tracking-tighter">AQUAFLOW</h1>
            <p class="text-zinc-500 text-sm font-bold uppercase tracking-widest mt-1">Control de Hidratación Inteligente</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Panel de Control Principal -->
            <div class="space-y-6">
                <div class="glass p-8 flex flex-col items-center shadow-2xl">
                    <div class="relative w-56 h-56 mb-8">
                        <svg class="w-full h-full" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1a1a" stroke-width="7" />
                            <circle id="ring" cx="50" cy="50" r="45" fill="none" stroke="#10b981" stroke-width="7" stroke-dasharray="282.7" stroke-dashoffset="282.7" stroke-linecap="round" class="progress-circle" />
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <span id="pctText" class="text-5xl font-extrabold text-white">0%</span>
                            <span class="text-[10px] text-emerald-500 uppercase font-bold tracking-widest">Progreso</span>
                        </div>
                    </div>
                    
                    <div class="text-center mb-8">
                        <div class="text-6xl font-black text-white leading-none mb-2">
                            <span id="currentVal">0</span><span class="text-xl text-emerald-500 ml-1">ml</span>
                        </div>
                        <p class="text-zinc-500 font-bold uppercase text-xs tracking-widest">
                            Meta: <span id="goalVal" class="text-emerald-400">2500</span> ml
                        </p>
                    </div>

                    <div class="grid grid-cols-3 gap-4 w-full">
                        <button id="add250" class="glass p-5 hover:bg-emerald-500/10 transition-all flex flex-col items-center group">
                            <span class="text-2xl mb-2 group-hover:scale-110 transition-transform">💧</span>
                            <span class="text-[10px] font-black uppercase tracking-widest">250ml</span>
                        </button>
                        <button id="add500" class="glass p-5 hover:bg-emerald-500/10 transition-all flex flex-col items-center group">
                            <span class="text-2xl mb-2 group-hover:scale-110 transition-transform">🧪</span>
                            <span class="text-[10px] font-black uppercase tracking-widest">500ml</span>
                        </button>
                        <button id="resetBtn" class="glass p-5 hover:bg-red-500/10 border-red-500/20 text-red-500 flex flex-col items-center group">
                            <span class="text-2xl mb-2 group-hover:scale-110 transition-transform">🗑️</span>
                            <span class="text-[10px] font-black uppercase tracking-widest">Reset</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Panel de Configuración e Historial -->
            <div class="space-y-6">
                <div class="glass p-6">
                    <h3 class="text-xs font-black text-emerald-500 uppercase mb-5 tracking-[0.2em]">Configuración Personal</h3>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-[10px] text-zinc-500 mb-2 font-black uppercase">Peso Actual (kg)</label>
                            <input type="number" id="weight" value="70" class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 text-emerald-400 font-extrabold outline-none focus:border-emerald-500/50 transition-colors">
                        </div>
                        <div>
                            <label class="block text-[10px] text-zinc-500 mb-2 font-black uppercase">Actividad Física</label>
                            <select id="activity" class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl p-4 text-emerald-400 font-extrabold outline-none focus:border-emerald-500/50 transition-colors appearance-none">
                                <option value="sedentary">Baja</option>
                                <option value="moderate" selected>Media</option>
                                <option value="active">Alta</option>
                            </select>
                        </div>
                    </div>
                    <button id="btnSaveConfig" class="w-full mt-6 btn-primary py-4 rounded-xl text-xs uppercase tracking-widest">Actualizar Perfil</button>
                </div>

                <div class="glass p-6">
                    <h3 class="text-xs font-black text-emerald-500 uppercase mb-5 tracking-[0.2em]">Resumen de la Semana</h3>
                    <div class="h-56">
                        <canvas id="chart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-12 text-center">
            <p class="text-zinc-600 text-[10px] uppercase font-bold tracking-[0.3em]">Tus datos se guardan localmente para mayor velocidad</p>
        </footer>
    </div>

    <script>
        // Configuración inicial y datos
        let chart = null;
        let data = {
            consumed: 0,
            weight: 70,
            activity: 'moderate',
            history: [0, 0, 0, 0, 0, 0, 0],
            lastUpdate: new Date().toDateString()
        };

        // Cargar datos al iniciar
        function loadData() {
            const saved = localStorage.getItem('aquaflow_local_v1');
            if (saved) {
                data = JSON.parse(saved);
                
                // Verificar si ha cambiado el día para reiniciar el contador diario
                const today = new Date().toDateString();
                if (data.lastUpdate !== today) {
                    data.consumed = 0;
                    data.lastUpdate = today;
                    saveData();
                }
            }
            updateUI();
        }

        // Guardar datos
        function saveData() {
            const dayIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1; // 0 para Lunes, 6 para Domingo
            data.history[dayIdx] = data.consumed;
            localStorage.setItem('aquaflow_local_v1', JSON.stringify(data));
            updateUI();
        }

        // Lógica de UI
        function updateUI() {
            // Calcular meta: 35ml por kg + extra por actividad
            const baseGoal = data.weight * 35;
            const extra = data.activity === 'moderate' ? 500 : (data.activity === 'active' ? 1000 : 0);
            const goal = baseGoal + extra;

            const pct = Math.min(Math.round((data.consumed / goal) * 100), 100);
            
            // Textos
            document.getElementById('currentVal').innerText = data.consumed;
            document.getElementById('goalVal').innerText = goal;
            document.getElementById('pctText').innerText = pct + '%';
            document.getElementById('weight').value = data.weight;
            document.getElementById('activity').value = data.activity;

            // Anillo de progreso (282.7 es el perímetro del círculo r=45)
            const ring = document.getElementById('ring');
            const offset = 282.7 - (pct / 100) * 282.7;
            ring.style.strokeDashoffset = offset;

            renderChart(goal);
        }

        // Gráfico
        function renderChart(goal) {
            const ctx = document.getElementById('chart').getContext('2d');
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'],
                    datasets: [{
                        label: 'ml consumidos',
                        data: data.history,
                        backgroundColor: '#10b981',
                        borderRadius: 8,
                        hoverBackgroundColor: '#34d399'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: Math.max(goal + 500, Math.max(...data.history) + 500),
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#52525b', font: { size: 10, weight: 'bold' } }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#52525b', font: { size: 10, weight: 'bold' } }
                        }
                    }
                }
            });
        }

        // Eventos
        document.getElementById('add250').onclick = () => { data.consumed += 250; saveData(); };
        document.getElementById('add500').onclick = () => { data.consumed += 500; saveData(); };
        document.getElementById('resetBtn').onclick = () => { 
            if(confirm('¿Deseas reiniciar tu progreso de hoy?')) {
                data.consumed = 0; 
                saveData(); 
            }
        };

        document.getElementById('btnSaveConfig').onclick = () => {
            const newWeight = parseFloat(document.getElementById('weight').value);
            if (newWeight > 0) {
                data.weight = newWeight;
                data.activity = document.getElementById('activity').value;
                saveData();
                alert('Perfil actualizado correctamente');
            }
        };

        // Inicialización
        window.onload = loadData;
    </script>
</body>
</html>
